version: 2

sources:
  - name: raw
    database: silken-quasar-483715-j6
    schema: gz_raw_data
    tables:
      - name: sales
        identifier: raw_gz_sales
      - name: product
        identifier: raw_gz_product
      - name: ship
        identifier: raw_gz_ship
      - name : adwords
        identifier : raw_gz_adwords
      - name : bing
        identifier: raw_gz_bing
      - name: criteo
        identifier: raw_gz_criteo
      - name: facebook
        identifier: raw_gz_facebook
models:
  - name: stg_raw__sales
    description: "Staging table for sales data"

    columns:
      - name: date_date
        description: "Date of the order"

      - name: orders_id
        description: "Unique identifier of the order"

        tests:
         - not_null
      - name: product_id
        description: "Identifier of the product"
       
      - name: revenue
        description: "Revenue generated by the order"

      - name: quantity
        description: "Quantity of products ordered"
  - name: stg_raw__product
    description: "Staging table for product data"

    columns:
      - name: products_id
        description: "Unique identifier of the product"
        tests:
          - unique
          - not_null
      - name: purchase_price
        description: "Purchase price of the product"  
  - name: stg_raw__ship
    description: "Staging table for shipping data"

    columns:
      - name: orders_id
        description: "Identifier of the order"
        tests:
          - unique
          - not_null
      - name: shipping_fee
        description: "Shipping fee paid by the customer"

      - name: ship_cost
        description: "Shipping cost paid by the company" 
  - name: int_campaigns
    description: "Combined advertising campaign data from all paid sources"

    columns:
      - name: date_date
        description: "Date of the campaign"

      - name: paid_source
        description: "Advertising platform (adwords, bing, criteo, facebook)"

      - name: campaign_key
        description: "Unique identifier of the campaign"
        tests:
         - not_null

      - name: campaign_name
        description: "Name of the advertising campaign"

      - name: ads_cost
        description: "Cost of the advertising campaign"

      - name: impression
        description: "Number of times the ad was shown"

      - name: click
        description: "Number of clicks on the advertisement"  
  - name: int_campaigns_day
    description: "Daily aggregated advertising campaign data"

    columns:
      - name: date_date
        description: "Date of the advertising performance"
        tests:
        - not_null

      - name: ads_cost
        description: "Total advertising cost per day"

      - name: impression
        description: "Total number of ad impressions per day"

      - name: click
        description: "Total number of ad clicks per day"